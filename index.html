<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vérification du pack — École du Nord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFAF5;
  --ink:#26235C;        /* encre violette / school ink */
  --ink-soft:#4A4694;
  --line:#D8E3F2;       /* seyes blue rule */
  --margin:#E4B4B4;     /* red margin line */
  --text:#1D1C24;
  --muted:#6C6B78;
  --ok:#2E9E6B;
  --ok-bg:#EAF6F0;
  --card:#FFFFFF;
  --shadow:0 1px 2px rgba(38,35,92,.06),0 6px 20px rgba(38,35,92,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:Inter,system-ui,-apple-system,sans-serif;
  color:var(--text);
  background-color:var(--paper);
  /* Seyes-ruled paper: fine horizontal lines + red margin */
  background-image:
    linear-gradient(90deg, transparent 26px, var(--margin) 26px, var(--margin) 27px, transparent 27px),
    repeating-linear-gradient(180deg, transparent 0 27px, var(--line) 27px 28px);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
.wrap{max-width:680px;margin:0 auto;padding:0 16px 64px}

/* Header */
header{
  position:sticky;top:0;z-index:20;
  margin:0 -16px 20px;padding:14px 16px calc(14px + env(safe-area-inset-bottom,0));
  padding-top:calc(14px + env(safe-area-inset-top,0));
  background:rgba(251,250,245,.86);
  backdrop-filter:saturate(1.2) blur(10px);
  border-bottom:1px solid rgba(38,35,92,.10);
}
.school{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.head-row{display:flex;align-items:center;gap:14px;margin-top:6px}
.classname{font-family:Fraunces,Georgia,serif;font-weight:700;color:var(--ink);
  font-size:clamp(30px,9vw,44px);line-height:1;margin:0;letter-spacing:-.01em}
.year{font-size:12.5px;color:var(--muted);margin-top:4px}
/* progress ring */
.ring{margin-left:auto;flex:0 0 auto;position:relative;width:58px;height:58px}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:var(--line)}
.ring .fg{stroke:var(--ok);stroke-linecap:round;transition:stroke-dashoffset .5s cubic-bezier(.4,0,.2,1)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--ink)}

.intro{font-size:14.5px;color:var(--muted);margin:0 0 22px;max-width:46ch}

/* Pack section */
.pack{background:var(--card);border-radius:16px;box-shadow:var(--shadow);
  margin-bottom:18px;overflow:hidden;border:1px solid rgba(38,35,92,.06)}
.pack-head{display:flex;align-items:baseline;gap:10px;padding:16px 18px 12px}
.pack-title{font-family:Fraunces,serif;font-weight:600;font-size:19px;color:var(--ink);margin:0}
.pack-count{font-size:12.5px;color:var(--muted);margin-left:auto;white-space:nowrap;font-variant-numeric:tabular-nums}

/* Item row */
.item{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;
  border-top:1px solid #F0EEE8;transition:background .12s;user-select:none}
.item:active{background:#FAF8F2}
.box{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:2px solid var(--ink-soft);
  display:grid;place-items:center;transition:all .15s}
.box svg{width:15px;height:15px;stroke:#fff;stroke-width:3.5;fill:none;
  stroke-dasharray:22;stroke-dashoffset:22;transition:stroke-dashoffset .2s}
.item.done .box{background:var(--ok);border-color:var(--ok)}
.item.done .box svg{stroke-dashoffset:0}
.item-main{flex:1 1 auto;min-width:0}
.item-name{font-size:15px;font-weight:500;color:var(--text);transition:color .15s}
.item-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:1px}
.item.done .item-name{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(46,158,107,.6)}
.qty{flex:0 0 auto;min-width:38px;height:38px;padding:0 10px;border-radius:10px;
  background:#EEF1FA;color:var(--ink);font-weight:700;font-size:15px;
  display:grid;place-items:center;font-variant-numeric:tabular-nums}
.qty small{font-size:10px;font-weight:600;color:var(--ink-soft);display:block;text-align:center;line-height:1;margin-top:-2px}

/* footer / actions */
.done-banner{display:flex;align-items:center;gap:10px;background:var(--ok-bg);
  color:var(--ok);border-radius:14px;padding:14px 18px;font-weight:600;font-size:15px;
  margin-bottom:18px;opacity:0;height:0;padding-top:0;padding-bottom:0;overflow:hidden;
  transition:all .3s}
.done-banner.show{opacity:1;height:auto;padding-top:14px;padding-bottom:14px}
.actions{display:flex;gap:12px;margin-top:8px;align-items:center;flex-wrap:wrap}
.btn{font-family:inherit;font-size:13.5px;font-weight:600;border-radius:10px;
  padding:10px 16px;border:1px solid rgba(38,35,92,.18);background:#fff;color:var(--ink);cursor:pointer}
.btn:active{background:#F4F2EC}
.note{font-size:12px;color:var(--muted);margin-top:18px;line-height:1.6}

/* class picker (fallback) */
.picker h1{font-family:Fraunces,serif;color:var(--ink);font-size:26px;margin:28px 0 6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:12px;margin-top:18px}
.chip{display:block;text-align:center;text-decoration:none;background:var(--card);
  border:1px solid rgba(38,35,92,.1);border-radius:14px;padding:18px 8px;box-shadow:var(--shadow);
  font-family:Fraunces,serif;font-weight:600;font-size:22px;color:var(--ink)}
.chip:active{background:#F4F2EC}
.chip small{display:block;font-family:Inter;font-weight:500;font-size:11px;color:var(--muted);margin-top:4px}

@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const params = new URLSearchParams(location.search);
const cls = params.get('class');
const app = document.getElementById('app');

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function render(){
  if(!cls || !DB.data[cls]){ renderPicker(); return; }
  const c = DB.data[cls];
  const key = 'edn_pack_'+cls;
  let state = {};
  try{ state = JSON.parse(localStorage.getItem(key)||'{}'); }catch(e){}

  const total = c.packs.reduce((n,p)=>n+p.items.length,0);

  let html = `<header>
    <div class="school">${esc(SCHOOL)}</div>
    <div class="head-row">
      <div>
        <h1 class="classname">${esc(c.display)}</h1>
        <div class="year">Liste des fournitures · ${esc(YEAR)}</div>
      </div>
      <div class="ring" id="ring">
        <svg width="58" height="58"><circle class="bg" cx="29" cy="29" r="25" fill="none" stroke-width="6"/>
        <circle class="fg" id="ringfg" cx="29" cy="29" r="25" fill="none" stroke-width="6"
          stroke-dasharray="${2*Math.PI*25}" stroke-dashoffset="${2*Math.PI*25}"/></svg>
        <div class="pct" id="pct">0%</div>
      </div>
    </div>
  </header>
  <p class="intro">Cochez chaque article au fur et à mesure que vous le retrouvez dans le pack de votre enfant.</p>
  <div class="done-banner" id="banner">✓ &nbsp;Pack complet — tous les articles sont présents.</div>`;

  c.packs.forEach((p,pi)=>{
    html += `<section class="pack"><div class="pack-head">
      <h2 class="pack-title">${esc(p.title||p.type)}</h2>
      <span class="pack-count">${p.items.length} article${p.items.length>1?'s':''}</span></div>`;
    p.items.forEach((it,ii)=>{
      const id = pi+'-'+ii;
      const done = state[id] ? ' done':'';
      const qtyNum = (it.qty===''||it.qty==null)?'':it.qty;
      html += `<div class="item${done}" data-id="${id}">
        <div class="box"><svg viewBox="0 0 18 18"><polyline points="3,9 7,13 15,4"/></svg></div>
        <div class="item-main">
          <div class="item-name">${esc(it.name)}</div>
          <div class="item-code">${esc(it.code)}</div>
        </div>
        <div class="qty">${esc(qtyNum)}<small>qté</small></div>
      </div>`;
    });
    html += `</section>`;
  });

  html += `<div class="actions">
      <button class="btn" id="reset">Tout décocher</button>
      <a class="btn" href="?" style="text-decoration:none">← Autre classe</a>
    </div>
    <p class="note">Vos coches sont enregistrées sur cet appareil uniquement.
    Article manquant ou abîmé ? Signalez-le à l'école.</p>`;

  app.innerHTML = html;

  const CIRC = 2*Math.PI*25;
  function update(){
    const checked = Object.values(state).filter(Boolean).length;
    const pct = total? Math.round(checked/total*100):0;
    document.getElementById('pct').textContent = pct+'%';
    document.getElementById('ringfg').style.strokeDashoffset = CIRC*(1-pct/100);
    document.getElementById('banner').classList.toggle('show', checked===total && total>0);
  }
  app.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click',()=>{
      const id = el.dataset.id;
      state[id] = !state[id];
      el.classList.toggle('done', !!state[id]);
      localStorage.setItem(key, JSON.stringify(state));
      update();
    });
  });
  document.getElementById('reset').addEventListener('click',()=>{
    state={}; localStorage.removeItem(key);
    app.querySelectorAll('.item.done').forEach(e=>e.classList.remove('done'));
    update();
  });
  update();
}

function renderPicker(){
  let html = `<div class="picker">
    <div class="school" style="margin-top:24px">${esc(SCHOOL)}</div>
    <h1>Choisissez la classe</h1>
    <p class="intro">Liste des fournitures ${esc(YEAR)}. Sélectionnez la classe de votre enfant.</p>
    <div class="grid">`;
  DB.classes.forEach(k=>{
    const t = DB.data[k].packs.reduce((n,p)=>n+p.items.length,0);
    html += `<a class="chip" href="?class=${encodeURIComponent(k)}">${esc(DB.data[k].display)}<small>${t} articles</small></a>`;
  });
  html += `</div></div>`;
  app.innerHTML = html;
}

render();
</script>
